<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Reader</title>
<style>
/* ====== твой CSS оставлен без изменений ====== */
:root{
  --bg:#f4f1ea;
  --panel:#fff;
  --text:#1f1f1f;
  --muted:#8a8a8a;
  --accent:#2f6f4f;
  --accent-soft:#e7f0ea;
  --underline:#1f1f1f;
  --border:#e3ddd0;
  --radius:14px;
  --serif:Georgia, serif;
}
[data-theme="dark"]{
  --bg:#15171a;
  --panel:#1d2024;
  --text:#e9e6df;
  --muted:#8c8f93;
  --accent:#7fd1a8;
  --accent-soft:#1f2b25;
  --border:#2b2f34;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial}

/* (остальной CSS у тебя не трогал — он большой, но рабочий) */
</style>
</head>

<body>

<div class="app">

<!-- ===== HOME ===== -->
<div class="view active" id="view-home">

  <h1>📖 English Reader</h1>

  <textarea id="inputText"></textarea>

  <button id="buildBtn">Open</button>

  <div id="library"></div>
</div>

<!-- ===== READER ===== -->
<div class="view" id="view-reader">

  <button id="backBtn">←</button>

  <div id="readingText"></div>

</div>

<!-- ===== WORDS ===== -->
<div class="view" id="view-words">
  <div id="wordsList"></div>
</div>

</div>

<script>

/* =========================
   STORAGE
========================= */
const LS_KNOWN = "er_known_v3";
const LS_TEXTS = "er_texts_v3";
const LS_SENT = "er_sent_v3";
const LS_WORDS = "er_words_v3";

let known = JSON.parse(localStorage.getItem(LS_KNOWN) || "{}");
let texts = JSON.parse(localStorage.getItem(LS_TEXTS) || "[]");
let sentCache = JSON.parse(localStorage.getItem(LS_SENT) || "{}");
let wordCache = JSON.parse(localStorage.getItem(LS_WORDS) || "{}");

let currentTextId = null;

/* =========================
   SAVE
========================= */
const save = () => {
  localStorage.setItem(LS_KNOWN, JSON.stringify(known));
  localStorage.setItem(LS_TEXTS, JSON.stringify(texts));
  localStorage.setItem(LS_SENT, JSON.stringify(sentCache));
  localStorage.setItem(LS_WORDS, JSON.stringify(wordCache));
};

/* =========================
   NAV
========================= */
const show = (id) => {
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

document.getElementById("backBtn").onclick = () => show("view-home");

/* =========================
   TEXT SPLIT
========================= */
function splitSentences(t){
  return t.match(/[^.!?]+[.!?]+/g) || [t];
}

function words(en){
  return (en.match(/[A-Za-z']+/g) || []).map(w=>w.toLowerCase());
}

/* =========================
   KNOWN CHECK (ВАЖНО: УПРОЩЕНО)
========================= */
function isKnown(w){
  return Object.values(known).some(p => p.eng.toLowerCase() === w);
}

/* =========================
   TRANSLATE
========================= */
async function trWord(w){
  if(wordCache[w]) return wordCache[w];
  const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=${w}`);
  const d = await r.json();
  const t = d[0][0][0];
  wordCache[w] = t;
  save();
  return t;
}

async function trSentence(s){
  if(sentCache[s]) return sentCache[s];
  const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=${encodeURIComponent(s)}`);
  const d = await r.json();
  const t = d[0][0][0];
  sentCache[s] = t;
  save();
  return t;
}

/* =========================
   RENDER
========================= */
async function renderText(raw){
  const container = document.getElementById("readingText");
  container.innerHTML = "";

  const sents = splitSentences(raw);

  for(const s of sents){
    const ws = words(s);

    const allKnown = ws.every(isKnown);

    if(allKnown){
      container.innerHTML += `<div>${s}</div>`;
      continue;
    }

    const ru = await trSentence(s);

    let html = ru;

    for(const w of ws){
      if(isKnown(w)){
        const eng = `<span class="kw" onclick="toggle('${w}')">${w}</span>`;
        html = html.replaceAll(w, eng);
      }
    }

    container.innerHTML += `<div>${html}</div>`;
  }
}

/* =========================
   CLICK WORD
========================= */
window.toggle = (w) => {
  const ru = wordCache[w] || w;
  if(known[ru]) delete known[ru];
  else known[ru] = {eng:w};
  save();
  render();
};

/* =========================
   OPEN TEXT
========================= */
function openText(id){
  const t = texts.find(x=>x.id===id);
  currentTextId = id;
  show("view-reader");
  renderText(t.raw);
}

/* =========================
   BUILD TEXT
========================= */
document.getElementById("buildBtn").onclick = () => {
  const raw = document.getElementById("inputText").value;
  const id = "t"+Date.now();
  texts.push({id, raw});
  save();
  openText(id);
};

/* =========================
   INIT
========================= */
function render(){ 
  if(currentTextId){
    const t = texts.find(x=>x.id===currentTextId);
    renderText(t.raw);
  }
}

</script>

</body>
</html>
